<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Strydom Travel Hub{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="{{ url_for('home') }}">Strydom Travel Hub</a>
      <nav class="nav">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('holiday_planning') }}">Plan a Holiday</a>
        <a href="{{ url_for('search') }}">Search</a>
      </nav>
    </div>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <form method="post" action="{{ url_for('clear_session') }}" class="footer-form">
      <button type="submit" class="btn btn-ghost">Clear saved plans</button>
    </form>
  </footer>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
